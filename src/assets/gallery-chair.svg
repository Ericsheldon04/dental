<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef6f4"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0c1f1c" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="980" cy="120" r="220" fill="#0d9488" opacity="0.08"/>
  <circle cx="250" cy="760" r="260" fill="#14b8a6" opacity="0.08"/>
  <g filter="url(#shadow)">
    <rect x="230" y="190" width="740" height="520" rx="34" fill="#ffffff" stroke="#d5e5e0" stroke-width="6"/>
    <rect x="310" y="260" width="360" height="160" rx="28" fill="url(#teal)" opacity="0.9"/>
    <rect x="310" y="430" width="440" height="200" rx="28" fill="#ffffff" stroke="#d5e5e0" stroke-width="6"/>
    <rect x="690" y="300" width="170" height="260" rx="28" fill="#f6faf9" stroke="#d5e5e0" stroke-width="6"/>
    <rect x="520" y="620" width="140" height="70" rx="18" fill="#0f766e" opacity="0.85"/>
    <rect x="460" y="670" width="260" height="36" rx="18" fill="#0c1f1c" opacity="0.12"/>
  </g>
  <text x="280" y="150" font-family="system-ui,Segoe UI,Arial" font-size="38" font-weight="700" fill="#0c1f1c" opacity="0.22">
    Dental Chair
  </text>
</svg>
