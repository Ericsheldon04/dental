<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1f1c"/>
      <stop offset="1" stop-color="#0f2b26"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14b8a6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0d9488" stop-opacity="0.10"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="980" cy="220" r="250" fill="url(#glow)" filter="url(#soft)"/>
  <circle cx="220" cy="760" r="280" fill="url(#glow)" filter="url(#soft)"/>
  <g filter="url(#shadow)">
    <rect x="250" y="160" width="700" height="580" rx="34" fill="#0b1715" stroke="#2a4c45" stroke-width="6"/>
    <rect x="290" y="210" width="620" height="480" rx="28" fill="#0c1f1c" stroke="#2a4c45" stroke-width="4"/>
    <g fill="none" stroke="#14b8a6" stroke-width="10" opacity="0.65" stroke-linecap="round">
      <path d="M420 420c20-80 80-130 180-130s160 50 180 130"/>
      <path d="M450 510c30 70 85 110 150 110s120-40 150-110"/>
    </g>
    <g fill="#14b8a6" opacity="0.55">
      <circle cx="430" cy="455" r="14"/>
      <circle cx="510" cy="440" r="14"/>
      <circle cx="600" cy="435" r="14"/>
      <circle cx="690" cy="440" r="14"/>
      <circle cx="770" cy="455" r="14"/>
    </g>
    <g fill="#14b8a6" opacity="0.25">
      <rect x="330" y="250" width="120" height="10" rx="5"/>
      <rect x="330" y="272" width="180" height="10" rx="5"/>
      <rect x="330" y="294" width="160" height="10" rx="5"/>
    </g>
  </g>
  <text x="270" y="120" font-family="system-ui,Segoe UI,Arial" font-size="38" font-weight="700" fill="#ffffff" opacity="0.22">
    Diagnostics / X-ray
  </text>
</svg>
